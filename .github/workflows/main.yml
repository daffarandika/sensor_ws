name: ITS Robocon ROS2 CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build_and_test_ros2:
    name: Build & Test (Humble)
    runs-on: ubuntu-22.04
    container:
      image: rostooling/setup-ros-docker:ubuntu-jammy-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: ${{ runner.os }}-rosdep-${{ hashFiles('**/package.xml') }}
          restore-keys: |
            ${{ runner.os }}-rosdep-

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            ~/ros_ws/build
            ~/ros_ws/install
            ~/ros_ws/log          # useful for debugging
          key: ${{ runner.os }}-colcon-humble-${{ hashFiles('**/package.xml', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-colcon-humble-

      - name: Build and run tests
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: sensor_reading
          target-ros2-distro: humble
          import-token: ${{ secrets.GITHUB_TOKEN }}   # recommended

      - name: Upload colcon logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: ~/ros_ws/log

  ament_lint:
    name: ament_${{ matrix.linter }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        linter: [cpplint, uncrustify, xmllint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.7

      - name: Run ament linter
        uses: ros-tooling/action-ros-lint@v0.1
        with:
          linter: ${{ matrix.linter }}
          package-name: sensor_reading
